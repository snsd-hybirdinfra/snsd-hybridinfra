diagram:
  scenario: vpn-latency-correlation
  lifecycle: level-2-correlation
  type: workflow-overview
  theme: dark-operational

layers:
  - id: telemetry
    label: Telemetry Stage

  - id: correlation
    label: Correlation Stage

  - id: analysis
    label: Analysis Stage

  - id: operational
    label: Operational Stage

  - id: evidence
    label: Evidence Stage

nodes:
  - id: telemetry_ingestion
    type: telemetry-source
    layer: telemetry
    label: Telemetry Ingestion

  - id: anomaly_detection
    type: analysis-layer
    layer: correlation
    label: Anomaly Detection

  - id: correlation_analysis
    type: analysis-layer
    layer: analysis
    label: Correlation Analysis

  - id: alert_propagation
    type: alert-layer
    layer: operational
    label: Alert Propagation

  - id: evidence_aggregation
    type: evidence-layer
    layer: evidence
    label: Evidence Aggregation

edges:
  - from: telemetry_ingestion
    to: anomaly_detection
    type: telemetry-flow
    label: telemetry ingestion

  - from: anomaly_detection
    to: correlation_analysis
    type: validation-flow
    label: anomaly correlation

  - from: correlation_analysis
    to: alert_propagation
    type: alert-flow
    label: correlated alert

  - from: alert_propagation
    to: evidence_aggregation
    type: evidence-flow
    label: operational evidence