type: object

required:
  - topology_name
  - lifecycle_level
  - nodes
  - edges

properties:

  topology_name:
    type: string

  lifecycle_level:
    type: string

  nodes:
    type: array
    items:
      type: object
      required:
        - id
        - label
        - type
      properties:
        id:
          type: string
        label:
          type: string
        type:
          type: string
        layer:
          type: string
        role:
          type: string

  edges:
    type: array
    items:
      type: object
      required:
        - source
        - target
        - relationship
      properties:
        source:
          type: string
        target:
          type: string
        relationship:
          type: string
        direction:
          type: string
        criticality:
          type: string
