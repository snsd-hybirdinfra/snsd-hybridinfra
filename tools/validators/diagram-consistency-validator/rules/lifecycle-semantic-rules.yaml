lifecycle_rules:

  level-1-visibility:
    forbidden:
      - rollback
      - failover
      - survivability
      - executive escalation
      - continuity governance

  level-2-correlation:
    forbidden:
      - rollback
      - failover
      - survivability
      - executive escalation

  level-3-recovery:
    forbidden:
      - executive escalation
      - governance coordination

  level-4-resilience:
    forbidden:
      - executive escalation
      - continuity governance

  level-5-continuity:
    forbidden: []
