---
- name: Collect runtime service status from all Ubuntu nodes
  hosts: ubuntu_nodes
  become: true
  gather_facts: true

  tasks:
    - name: Collect service status
      ansible.builtin.shell: |
        set -e
        echo "## Host"
        hostname
        echo
        echo "## Time"
        date '+%Y-%m-%d %H:%M:%S %Z %z'
        echo
        echo "## IP Address"
        hostname -I
        echo
        echo "## Active Services"
        for svc in docker node_exporter promtail haproxy prometheus grafana-server loki blackbox_exporter mariadb mysqld_exporter alertmanager chrony; do
          if systemctl list-unit-files "${svc}.service" >/dev/null 2>&1; then
            echo "${svc}: $(systemctl is-active ${svc} 2>/dev/null || true)"
          fi
        done
        echo
        echo "## Listening Ports"
        ss -lntp || true
      args:
        executable: /bin/bash
      register: runtime_status
      changed_when: false

    - name: Store runtime status as host fact
      ansible.builtin.set_fact:
        snsd_runtime_status: "{{ runtime_status.stdout }}"

- name: Collect monitoring and recovery evidence on control node
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    evidence_dir: "./labs/evidence/generated"

  tasks:
    - name: Ensure evidence directory exists
      ansible.builtin.file:
        path: "{{ evidence_dir }}"
        state: directory
        mode: "0755"

    - name: Write runtime service inventory
      ansible.builtin.copy:
        dest: "{{ evidence_dir }}/runtime-service-inventory.md"
        mode: "0644"
        content: |
          # Runtime Service Inventory

          Generated At: {{ lookup('pipe', 'date "+%Y-%m-%d %H:%M:%S %Z %z"') }}

          {% for host in groups['ubuntu_nodes'] %}
          ---

          # {{ host }}

          ```text
          {{ hostvars[host].snsd_runtime_status | default('NO_RUNTIME_STATUS_COLLECTED') }}
          ```

          {% endfor %}

    - name: Collect Prometheus target status
      ansible.builtin.shell: |
        set -e
        curl -s http://192.168.1.40:9090/api/v1/targets | jq '
          {
            activeTargets: [
              .data.activeTargets[] |
              {
                job: .labels.job,
                instance: .labels.instance,
                health: .health,
                scrapeUrl: .scrapeUrl,
                lastError: .lastError
              }
            ]
          }'
      args:
        executable: /bin/bash
      register: prometheus_targets
      changed_when: false
      failed_when: false

    - name: Write monitoring target status
      ansible.builtin.copy:
        dest: "{{ evidence_dir }}/monitoring-target-status.md"
        mode: "0644"
        content: |
          # Monitoring Target Status

          Generated At: {{ lookup('pipe', 'date "+%Y-%m-%d %H:%M:%S %Z %z"') }}

          Source: Prometheus API `/api/v1/targets`

          ```json
          {{ prometheus_targets.stdout | default('PROMETHEUS_TARGET_COLLECTION_FAILED') }}
          ```

    - name: Collect Prometheus alert status
      ansible.builtin.shell: |
        set -e
        curl -s http://192.168.1.40:9090/api/v1/alerts | jq '
          {
            alerts: [
              .data.alerts[] |
              {
                state: .state,
                alertname: .labels.alertname,
                severity: .labels.severity,
                lifecycle: .labels.lifecycle,
                job: .labels.job,
                instance: .labels.instance,
                activeAt: .activeAt,
                value: .value
              }
            ]
          }'
      args:
        executable: /bin/bash
      register: prometheus_alerts
      changed_when: false
      failed_when: false

    - name: Collect Alertmanager status
      ansible.builtin.shell: |
        set -e
        curl -s http://192.168.1.40:9093/api/v2/status | jq
      args:
        executable: /bin/bash
      register: alertmanager_status
      changed_when: false
      failed_when: false

    - name: Write alerting validation summary
      ansible.builtin.copy:
        dest: "{{ evidence_dir }}/alerting-validation-summary.md"
        mode: "0644"
        content: |
          # Alerting Validation Summary

          Generated At: {{ lookup('pipe', 'date "+%Y-%m-%d %H:%M:%S %Z %z"') }}

          ## Prometheus Alerts

          ```json
          {{ prometheus_alerts.stdout | default('PROMETHEUS_ALERT_COLLECTION_FAILED') }}
          ```

          ## Alertmanager Status

          ```json
          {{ alertmanager_status.stdout | default('ALERTMANAGER_STATUS_COLLECTION_FAILED') }}
          ```

    - name: Collect backup and restore metrics
      ansible.builtin.shell: |
        set -e
        curl -s http://192.168.1.40:9100/metrics | grep -E "snsd_backup|snsd_restore|node_textfile" || true
      args:
        executable: /bin/bash
      register: backup_restore_metrics
      changed_when: false
      failed_when: false

    - name: Collect HAProxy continuity status
      ansible.builtin.shell: |
        set -e
        echo "## HAProxy Frontend"
        curl -s http://192.168.1.20 | grep -E "hostname|status" || true
        echo
        echo "## Backend Direct Checks"
        curl -s http://192.168.1.31 | grep -E "hostname|status" || true
        echo
        curl -s http://192.168.1.32 | grep -E "hostname|status" || true
        echo
        echo "## Blackbox Probe Success"
        curl -s "http://192.168.1.40:9115/probe?target=http://192.168.1.20&module=http_2xx" | grep probe_success || true
        curl -s "http://192.168.1.40:9115/probe?target=192.168.1.20&module=icmp" | grep probe_success || true
      args:
        executable: /bin/bash
      register: recovery_validation
      changed_when: false
      failed_when: false

    - name: Write recovery validation summary
      ansible.builtin.copy:
        dest: "{{ evidence_dir }}/recovery-validation-summary.md"
        mode: "0644"
        content: |
          # Recovery Validation Summary

          Generated At: {{ lookup('pipe', 'date "+%Y-%m-%d %H:%M:%S %Z %z"') }}

          ## Backup / Restore Metrics

          ```text
          {{ backup_restore_metrics.stdout | default('BACKUP_RESTORE_METRICS_COLLECTION_FAILED') }}
          ```

          ## HAProxy / Probe Continuity

          ```text
          {{ recovery_validation.stdout | default('RECOVERY_VALIDATION_COLLECTION_FAILED') }}
          ```
