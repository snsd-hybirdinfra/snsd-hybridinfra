artifact_contracts:

  normalized_metadata:
    type: metadata
    required: true

  relationship_graph:
    type: graph
    required: true

  scenario_package:
    type: package
    required: true

  svg_sources:
    type: visualization
    required: true

  png_artifacts:
    type: visualization
    required: true

  taxonomy_report:
    type: validation
    required: true

  relationship_validation_report:
    type: validation
    required: true

  governance_report:
    type: governance
    required: true

contract_rules:

  - all required artifacts must exist before downstream execution
  - governance-checker must not execute without validation reports
  - diagram-renderer must not execute before scenario package generation
  - relationship validation must execute before governance validation
