artificial_complexity_rules:

  forbidden_patterns:

    - unnecessary-multi-domain
    - fake-enterprise-continuity
    - recovery-in-visibility-scenario
    - executive-governance-in-l1
    - resilience-wording-without-failover
    - automation-without-decision-point

  lifecycle_limits:

    level-1-visibility:
      max_complexity: L1
      forbidden_terms:
        - orchestration
        - failover
        - continuity
        - executive

    level-2-correlation:
      max_complexity: L2
      forbidden_terms:
        - enterprise continuity
        - distributed survivability

    level-3-recovery:
      max_complexity: L3
      forbidden_terms:
        - executive continuity
        - enterprise governance

    level-4-resilience:
      max_complexity: L4
      required_terms:
        - failover
        - survivability
        - distributed

    level-5-continuity:
      max_complexity: L5
      required_terms:
        - continuity
        - governance
        - enterprise
