diagram:
  scenario: vpn-tunnel-recovery-automation
  lifecycle: level-3-recovery
  type: workflow-overview
  theme: dark-operational

layers:
  - id: detection
    label: Detection Stage

  - id: recovery
    label: Recovery Stage

  - id: validation
    label: Validation Stage

  - id: evidence
    label: Evidence Stage

nodes:
  - id: degradation_confirmation
    type: telemetry-source
    layer: detection
    label: Degradation Confirmation

  - id: recovery_activation
    type: alert-layer
    layer: recovery
    label: Recovery Activation

  - id: restoration_sequence
    type: analysis-layer
    layer: recovery
    label: Restoration Sequence

  - id: rollback_visibility
    type: analysis-layer
    layer: validation
    label: Rollback Visibility

  - id: recovery_confirmation
    type: evidence-layer
    layer: evidence
    label: Recovery Confirmation

edges:
  - from: degradation_confirmation
    to: recovery_activation
    type: alert-flow
    label: recovery trigger

  - from: recovery_activation
    to: restoration_sequence
    type: validation-flow
    label: restoration ordering

  - from: restoration_sequence
    to: rollback_visibility
    type: validation-flow
    label: rollback validation

  - from: rollback_visibility
    to: recovery_confirmation
    type: evidence-flow
    label: recovery evidence