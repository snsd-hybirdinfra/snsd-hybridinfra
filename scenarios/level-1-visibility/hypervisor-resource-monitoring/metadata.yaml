overview: 'This scenario documents hypervisor resource monitoring within the virtualization operational domain.

  It focuses on hypervisor, VM host, resource pool, guest workload and demonstrates how infrastructure

  operations teams can use domain-specific telemetry, lifecycle workflow design, and evidence-backed

  validation to support detect and expose operational health signals before incident escalation.

  '
objectives:
- Define the scenario-specific virtualization signal represented by hypervisor-resource-monitoring.
- Identify the affected virtualization components and dependencies.
- Collect and interpret telemetry from hypervisor, VM host, resource pool, guest workload.
- Use health status as an operational signal for detection or validation.
- Use availability signal as an operational signal for detection or validation.
- Use latency as an operational signal for detection or validation.
- Document the lifecycle workflow from detection through validation.
- Produce reviewer-readable evidence artifacts for portfolio assessment.
