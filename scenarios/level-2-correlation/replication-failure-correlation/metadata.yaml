overview: 'This scenario documents replication failure correlation within the database / replication

  operational domain. It focuses on replication channel, source database, replica database, lag signal

  and demonstrates how infrastructure operations teams can use domain-specific telemetry, lifecycle

  workflow design, and evidence-backed validation to support correlate related symptoms, dependencies,

  and impact paths.

  '
