overview: 'This scenario documents pod failure correlation within the container / pod operational domain. It

  focuses on pod, container, node, workload, service endpoint and demonstrates how infrastructure

  operations teams can use domain-specific telemetry, lifecycle workflow design, and evidence-backed

  validation to support correlate related symptoms, dependencies, and impact paths.

  '
