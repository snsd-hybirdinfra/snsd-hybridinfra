type: object

required:
  - scenario_name
  - lifecycle_level
  - operational_scope
  - environment

properties:

  scenario_name:
    type: string

  lifecycle_level:
    type: string

  operational_scope:
    type: string

  environment:
    type: string

  modules:
    type: array
    items:
      type: string

  adapters:
    type: array
    items:
      type: string

  previous_scenarios:
    type: array
    items:
      type: string

  next_scenarios:
    type: array
    items:
      type: string

  diagrams:
    type: array
    items:
      type: string
