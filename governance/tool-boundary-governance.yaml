tool_boundary_governance:

  authoritative_tool_root:
    path: tools/

  boundary_rules:

    no_nested_tools:
      enabled: true
      forbidden_pattern: tools/**/tools/**

    no_schema_duplication:
      enabled: true
      authoritative_root: shared-runtime/

    no_governance_duplication:
      enabled: true
      authoritative_root: governance/

    no_runtime_workspace_commit:
      enabled: true
      forbidden_path: tools/runtime-workspace/

  allowed_tool_local_files:

    - main.py
    - manifest.yaml
    - requirements.txt
    - README.md
    - src/
    - models/
    - templates/
    - examples/
    - schemas/

  governance_notes:

    Tools may own implementation details.
    Tools must not own repository-wide policy.
    Tools must not contain nested copies of other tools.
    Shared contracts belong only to shared-runtime/.
    Governance policies belong only to governance/.
