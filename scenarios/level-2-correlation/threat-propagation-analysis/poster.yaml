poster:
  title: Threat Propagation Analysis
  subtitle: Correlation & Impact Analysis Board for Threat Propagation Analysis
  lifecycle: level-2-correlation
  domain: Infrastructure Operations
  width: 2600
  height: 1900
sections:
- id: signal-domain
  title: Signal & Service Domains
  summary: 4 SIGNAL DOMAINS
  description: Infrastructure, application, and service signals used for DNS failure correlation.
  cards:
  - title: Client Requests
    subtitle: DNS query traffic
    type: client-signal
    status: Observed
    icon: 👥
  - title: DNS Resolver
    subtitle: Resolver response state
    type: dns
    status: Monitored
    icon: 🌐
  - title: Service Endpoint
    subtitle: Application dependency
    type: service
    status: Reachable
    icon: 🖥️
  - title: Network Path
    subtitle: Resolver network path
    type: network
    status: Observed
    icon: 🔀
- id: correlation-platform
  title: Monitoring & Correlation Platform
  summary: CORRELATION ACTIVE
  description: Telemetry normalization and cross-signal correlation for DNS impact analysis.
  cards:
  - title: Telemetry Collector
    subtitle: DNS logs and metrics
    type: telemetry
    status: Streaming
    icon: 📡
  - title: Correlation Engine
    emphasis: true
    subtitle: Cross-signal symptom matching
    type: correlation
    status: Analyzing
    icon: 🧠
  - title: Dependency Mapper
    subtitle: DNS dependency mapping
    type: dependency
    status: Mapped
    icon: 🕸️
  - title: Incident Signal
    subtitle: Correlated incident candidate
    type: incident
    status: Ready
    icon: 🚨
- id: impact-analysis
  title: Dependency & Impact Analysis
  summary: IMPACT MAPPED
  description: Operational analysis components used to determine service and business impact.
  cards:
  - title: Resolver Health
    subtitle: Availability and latency analysis
    type: analysis
    status: Normal
    icon: ✅
  - title: Query Failure Pattern
    subtitle: Failure trend detection
    type: analysis
    status: Detected
    icon: 📉
  - title: Service Impact
    subtitle: Service dependency risk
    type: impact
    status: Assessed
    icon: ⚠️
  - title: Risk Score
    emphasis: true
    emphasis_label: DECISION
    subtitle: Severity and priority estimate
    type: risk
    status: Calculated
    icon: 📌
- id: operational-insight
  title: Operational Insight & Decision Support
  summary: INSIGHT READY
  description: Reviewer-facing outputs used by operations teams during correlation review.
  cards:
  - title: Impact Dashboard
    subtitle: DNS impact visibility
    type: dashboard
    status: Visible
    icon: 📊
  - title: Incident Context
    subtitle: Symptoms and suspected cause
    type: context
    status: Available
    icon: 🧾
  - title: Operator Guidance
    subtitle: Investigation guidance
    type: guidance
    status: Ready
    icon: 🧭
  - title: Validation Evidence
    subtitle: Incident review evidence
    type: evidence
    status: Prepared
    icon: 📦
workflow:
  title: Correlation Workflow
  steps:
  - title: Detect
    description: Capture DNS query failures and resolver symptoms.
    status: Ready
  - title: Correlate
    description: Join resolver, network, client, and service signals.
    status: Analyzing
  - title: Map Impact
    description: Identify dependent services and affected paths.
    status: Mapped
  - title: Prioritize
    description: Assign operational severity and response priority.
    status: Calculated
  - title: Escalate
    description: Prepare incident context and reviewer evidence.
    status: Ready
dashboards:
- title: Threat Propagation Analysis Status
  widgets:
  - label: Overall Impact
    value: Moderate
    status: warning
  - label: Resolver Health
    value: Normal
    status: healthy
  - label: Failure Pattern
    value: Detected
    status: warning
  - label: Affected Services
    value: '3'
    status: warning
  - label: Risk Score
    value: P2
    status: warning
  - label: Evidence
    value: Prepared
    status: verified
legend:
- label: Signal Domain
  color: blue
- label: Correlation Platform
  color: purple
- label: Impact Analysis
  color: red
- label: Operational Insight
  color: green
- label: Core Correlation Capability
  color: purple
- label: Operational Decision Point
  color: yellow
