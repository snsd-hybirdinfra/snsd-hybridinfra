relationship_architecture:

  model: lifecycle-pyramid

  lifecycle_shape:
    level-1-visibility:
      role: wide-operational-visibility-base
      relationship_mode: fan-out

    level-2-correlation:
      role: cross-domain-correlation-aggregation
      relationship_mode: fan-in-and-chain

    level-3-recovery:
      role: recovery-domain-concentration
      relationship_mode: chain-and-consolidation

    level-4-resilience:
      role: resilience-convergence
      relationship_mode: convergence

    level-5-continuity:
      role: enterprise-continuity-convergence
      relationship_mode: enterprise-rollup

relationship_types:

  lifecycle_chain:
    - previous_lifecycle_scenario
    - next_lifecycle_scenario

  aggregation:
    - aggregation_sources
    - operational_rollups

  convergence:
    - convergence_parent
    - convergence_children

  resilience:
    - resilience_reference
    - survivability_reference

  continuity:
    - continuity_reference
    - enterprise_rollup_reference

relationship_rules:

  - L1 scenarios may feed multiple L2 correlation scenarios.
  - L2 scenarios may aggregate multiple L1 visibility domains.
  - L3 scenarios may consolidate multiple correlated operational failures.
  - L4 scenarios must represent convergence across multiple recovery or resilience domains.
  - L5 scenarios must represent enterprise-level continuity rollup.
  - L4 and L5 should not be treated as simple linear next steps.
  - Relationship graphs must remain directed and controlled.
  - Recursive traversal is not required for baseline governance.
