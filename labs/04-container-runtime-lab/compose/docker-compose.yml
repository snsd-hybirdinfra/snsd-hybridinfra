services:
  runtime-web:
    image: nginx:stable-alpine
    container_name: snsd-runtime-web
    ports:
      - "18080:80"
    volumes:
      - ../configs/index.html:/usr/share/nginx/html/index.html:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ | grep -q 'SNSD Container Runtime Lab'"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  runtime-worker:
    image: busybox:stable
    container_name: snsd-runtime-worker
    command: ["sh", "-c", "while true; do echo runtime-worker-alive; sleep 30; done"]
    restart: unless-stopped