overview: |
  This scenario documents query lock analysis within the database / query operational domain. It
  focuses on query workload, lock state, connection pool, database runtime and demonstrates how
  infrastructure operations teams can use domain-specific telemetry, lifecycle workflow design, and
  evidence-backed validation to support correlate related symptoms, dependencies, and impact paths.

objectives:
  - Define the scenario-specific database / query signal represented by query-lock-analysis.
  - Identify the affected database / query components and dependencies.
  - Collect and interpret telemetry from query workload, lock state, connection pool, database runtime.
  - Use health status as an operational signal for detection or validation.
  - Use availability signal as an operational signal for detection or validation.
  - Use latency as an operational signal for detection or validation.
  - Document the lifecycle workflow from detection through validation.
  - Produce reviewer-readable evidence artifacts for portfolio assessment.

