diagram:
  type: relationship-overview
  title: Kubernetes Service Recovery - relationship-overview

  scenario: kubernetes-service-recovery
  lifecycle: level-3-recovery
  layout: left-to-right

nodes:
  - id: kubernetes-cluster
    label: Kubernetes Cluster
    type: cluster
    group: platform
  - id: worker-node
    label: Worker Node
    type: compute
    group: platform
  - id: pod-workload
    label: Pod Workload
    type: workload
    group: platform
  - id: cluster-telemetry
    label: Cluster Telemetry
    type: telemetry
    group: observability
  - id: operations-dashboard
    label: Operations Dashboard
    type: dashboard
    group: observability
  - id: recovery-orchestrator
    label: Recovery Orchestrator
    type: automation
    group: recovery
edges:
  - from: kubernetes-cluster
    to: worker-node
    label: schedules workloads
  - from: worker-node
    to: pod-workload
    label: runs pods
  - from: pod-workload
    to: cluster-telemetry
    label: emits runtime signals
  - from: cluster-telemetry
    to: operations-dashboard
    label: publishes visibility
  - from: operations-dashboard
    to: recovery-orchestrator
    label: triggers recovery workflow
