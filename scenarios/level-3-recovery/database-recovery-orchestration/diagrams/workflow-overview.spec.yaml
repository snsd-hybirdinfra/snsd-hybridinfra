diagram:
  type: workflow-overview
  title: Database Recovery Orchestration - workflow-overview

  scenario: database-recovery-orchestration
  lifecycle: level-3-recovery
  layout: left-to-right

nodes:
  - id: application-service
    label: Application Service
    type: service
    group: service
  - id: database-primary
    label: Primary Database
    type: database
    group: data
  - id: database-replica
    label: Database Replica
    type: database
    group: data
  - id: database-telemetry
    label: Database Telemetry
    type: telemetry
    group: observability
  - id: analysis-engine
    label: Analysis Engine
    type: analysis
    group: analysis
  - id: recovery-orchestrator
    label: Recovery Orchestrator
    type: automation
    group: recovery
edges:
  - from: application-service
    to: database-primary
    label: queries
  - from: database-primary
    to: database-replica
    label: replicates
  - from: database-primary
    to: database-telemetry
    label: emits metrics
  - from: database-telemetry
    to: analysis-engine
    label: correlates health
  - from: analysis-engine
    to: recovery-orchestrator
    label: triggers recovery workflow
