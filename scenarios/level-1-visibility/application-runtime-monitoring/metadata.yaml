overview: |
  This scenario documents application runtime monitoring within the application runtime operational
  domain. It focuses on application process, runtime endpoint, container or VM-hosted service and
  demonstrates how infrastructure operations teams can use domain-specific telemetry, lifecycle
  workflow design, and evidence-backed validation to support detect and expose operational health
  signals before incident escalation.

objectives:
  - Define the scenario-specific application runtime signal represented by application-runtime-monitoring.
  - Identify the affected application runtime components and dependencies.
  - Collect and interpret telemetry from application process, runtime endpoint, container or VM-hosted service.
  - Use health endpoint status as an operational signal for detection or validation.
  - Use process uptime as an operational signal for detection or validation.
  - Use restart count as an operational signal for detection or validation.
  - Document the lifecycle workflow from detection through validation.
  - Produce reviewer-readable evidence artifacts for portfolio assessment.

operational_focus: |
