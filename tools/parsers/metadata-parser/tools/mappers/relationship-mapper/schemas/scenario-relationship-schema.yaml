type: object

required:
  - scenario_name
  - lifecycle_level
  - relationships

properties:

  scenario_name:
    type: string

  lifecycle_level:
    type: string

  relationships:
    type: object

    properties:

      upstream:
        type: array
        items:
          type: string

      downstream:
        type: array
        items:
          type: string

      related_visibility:
        type: array
        items:
          type: string

      related_correlation:
        type: array
        items:
          type: string

      related_recovery:
        type: array
        items:
          type: string

      related_resilience:
        type: array
        items:
          type: string

      related_continuity:
        type: array
        items:
          type: string

      modules:
        type: array
        items:
          type: string

      adapters:
        type: array
        items:
          type: string
