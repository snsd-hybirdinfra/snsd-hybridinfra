scenario_qualification_levels:

  gold-reference:

    description:
      repository-wide authoritative reference scenario

    requirements:
      - lifecycle-purity
      - operational-realism
      - governance-alignment
      - topology-validation
      - readability-validation

  production-reference:

    description:
      production-grade reusable operational scenario

    requirements:
      - lifecycle-alignment
      - capability-validation
      - operational-consistency

  capability-reference:

    description:
      focused capability demonstration scenario

    requirements:
      - capability-purity
      - module-validation

  experimental:

    description:
      experimental operational modeling scenario

    requirements:
      - partial-validation-allowed

  deprecated:

    description:
      retired or governance-replaced scenario

    requirements:
      - replacement-reference-required
