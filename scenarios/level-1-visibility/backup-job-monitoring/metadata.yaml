overview: |
  This scenario documents backup job monitoring within the backup / recovery operational domain. It
  focuses on backup job, backup scheduler, protected workload, backup repository, recovery point and
  demonstrates how infrastructure operations teams can use domain-specific telemetry, lifecycle
  workflow design, and evidence-backed validation to support detect and expose operational health
  signals before incident escalation.

objectives:
  - Define the scenario-specific backup / recovery signal represented by backup-job-monitoring.
  - Identify the affected backup / recovery components and dependencies.
  - Collect and interpret telemetry from backup job, backup scheduler, protected workload, backup repository, recovery point.
  - Use backup job status as an operational signal for detection or validation.
  - Use last successful backup timestamp as an operational signal for detection or validation.
  - Use backup duration as an operational signal for detection or validation.
  - Document the lifecycle workflow from detection through validation.
  - Produce reviewer-readable evidence artifacts for portfolio assessment.

