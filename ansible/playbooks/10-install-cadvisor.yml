---
- name: Install cAdvisor on app nodes
  hosts: app
  become: true
  gather_facts: true

  tasks:
    - name: Run cAdvisor container
      community.docker.docker_container:
        name: cadvisor
        image: gcr.io/cadvisor/cadvisor:v0.49.1
        state: started
        restart_policy: always
        privileged: true
        published_ports:
          - "8080:8080"
        volumes:
          - /:/rootfs:ro
          - /var/run:/var/run:ro
          - /sys:/sys:ro
          - /var/lib/docker/:/var/lib/docker:ro
          - /dev/disk/:/dev/disk:ro

    - name: Check cAdvisor metrics endpoint
      ansible.builtin.uri:
        url: http://127.0.0.1:8080/metrics
        method: GET
        status_code: 200

    - name: Print cAdvisor access
      ansible.builtin.debug:
        msg:
          - "host={{ inventory_hostname }}"
          - "cadvisor=http://{{ ansible_host }}:8080/metrics"

- name: Add cAdvisor scrape job to Prometheus
  hosts: monitoring
  become: true
  gather_facts: false

  tasks:
    - name: Insert cAdvisor scrape job into Prometheus config
      ansible.builtin.blockinfile:
        path: /etc/prometheus/prometheus.yml
        marker: "# {mark} SNSD CADVISOR SCRAPE JOB"
        insertafter: EOF
        block: |

          # SNSD cAdvisor container metrics
            - job_name: "cadvisor"
              static_configs:
                - targets:
                    - "192.168.1.31:8080"
                    - "192.168.1.32:8080"

    - name: Validate Prometheus config
      ansible.builtin.command: promtool check config /etc/prometheus/prometheus.yml
      changed_when: false

    - name: Restart Prometheus
      ansible.builtin.systemd:
        name: prometheus
        state: restarted
        enabled: true

    - name: Check Prometheus health
      ansible.builtin.uri:
        url: http://127.0.0.1:9090/-/healthy
        method: GET
        status_code: 200
      register: prometheus_health
      retries: 10
      delay: 3
      until: prometheus_health.status == 200

    - name: Print Prometheus target URL
      ansible.builtin.debug:
        msg:
          - "Prometheus targets: http://192.168.1.40:9090/targets"
          - "cAdvisor targets: 192.168.1.31:8080, 192.168.1.32:8080"
