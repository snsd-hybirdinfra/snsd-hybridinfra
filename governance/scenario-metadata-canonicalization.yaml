canonical_metadata_fields:

  identity:
    - scenario_id
    - scenario_name
    - scenario_title

  lifecycle:
    - lifecycle_level
    - operational_domain
    - operational_pattern
    - capability_tier

  operational_scope:
    - environment
    - severity
    - priority
    - validation_scope
    - telemetry_scope
    - recovery_scope
    - governance_scope

  relationships:
    - previous_lifecycle_scenario
    - next_lifecycle_scenario
    - related_capabilities
    - dependency_scenarios
    - escalation_scenarios

  generation:
    - template_profile
    - diagram_profile
    - validation_profile
    - maturity_profile

metadata_governance:

  source_of_truth:
    metadata_file: scenario.yaml
    readme_file: README.md

  rule:
    README.md must be generated from canonical scenario metadata.
    Scenario relationships must be declared in metadata before being rendered into README.md.
    Diagram specs must be generated from canonical metadata and lifecycle profile.
