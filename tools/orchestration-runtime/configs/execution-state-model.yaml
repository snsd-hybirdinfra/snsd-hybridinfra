execution_states:

  PENDING:
    description: tool execution not started

  RUNNING:
    description: tool execution currently active

  COMPLETED:
    description: execution completed successfully

  WARNING:
    description: execution completed with warnings

  FAILED:
    description: execution failed

  BLOCKED:
    description: downstream execution blocked

state_rules:

  - FAILED validators may block governance execution
  - WARNING validators do not block orchestration
  - BLOCKED tools must not emit downstream artifacts
  - governance-checker must not execute if critical validators failed
