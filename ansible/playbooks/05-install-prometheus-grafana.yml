---
- name: Install Prometheus and Grafana on data-ops-node
  hosts: monitoring
  become: true
  gather_facts: true

  vars:
    prometheus_version: "2.54.1"
    prometheus_arch: "linux-amd64"
    prometheus_user: "prometheus"
    prometheus_targets:
      - "192.168.1.10:9100"
      - "192.168.1.20:9100"
      - "192.168.1.31:9100"
      - "192.168.1.32:9100"
      - "192.168.1.40:9100"

  tasks:
    - name: Install base packages
      ansible.builtin.apt:
        name:
          - curl
          - wget
          - gnupg
          - ca-certificates
          - apt-transport-https
          - software-properties-common
        state: present
        update_cache: true

    - name: Create prometheus system user
      ansible.builtin.user:
        name: "{{ prometheus_user }}"
        shell: /usr/sbin/nologin
        system: true
        create_home: false

    - name: Create prometheus directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: "{{ prometheus_user }}"
        group: "{{ prometheus_user }}"
        mode: "0755"
      loop:
        - /etc/prometheus
        - /var/lib/prometheus

    - name: Download Prometheus archive
      ansible.builtin.get_url:
        url: "https://github.com/prometheus/prometheus/releases/download/v{{ prometheus_version }}/prometheus-{{ prometheus_version }}.{{ prometheus_arch }}.tar.gz"
        dest: "/tmp/prometheus-{{ prometheus_version }}.{{ prometheus_arch }}.tar.gz"
        mode: "0644"

    - name: Extract Prometheus archive
      ansible.builtin.unarchive:
        src: "/tmp/prometheus-{{ prometheus_version }}.{{ prometheus_arch }}.tar.gz"
        dest: /tmp
        remote_src: true

    - name: Install Prometheus binaries
      ansible.builtin.copy:
        src: "/tmp/prometheus-{{ prometheus_version }}.{{ prometheus_arch }}/{{ item }}"
        dest: "/usr/local/bin/{{ item }}"
        owner: root
        group: root
        mode: "0755"
        remote_src: true
      loop:
        - prometheus
        - promtool

    - name: Install Prometheus console files
      ansible.builtin.copy:
        src: "/tmp/prometheus-{{ prometheus_version }}.{{ prometheus_arch }}/{{ item }}"
        dest: "/etc/prometheus/{{ item }}"
        owner: "{{ prometheus_user }}"
        group: "{{ prometheus_user }}"
        mode: "0755"
        remote_src: true
      loop:
        - consoles
        - console_libraries

    - name: Create Prometheus config
      ansible.builtin.copy:
        dest: /etc/prometheus/prometheus.yml
        owner: "{{ prometheus_user }}"
        group: "{{ prometheus_user }}"
        mode: "0644"
        content: |
          global:
            scrape_interval: 15s
            evaluation_interval: 15s

          rule_files:
            - /etc/prometheus/rules/*.yml

          alerting:
            alertmanagers:
              - static_configs:
                  - targets:
                      - 127.0.0.1:9093

          scrape_configs:
            - job_name: "prometheus"
              static_configs:
                - targets:
                    - 127.0.0.1:9090

            - job_name: "node_exporter"
              static_configs:
                - targets:
          {% for target in prometheus_targets %}
                    - "{{ target }}"
          {% endfor %}

            - job_name: "cadvisor"
              static_configs:
                - targets:
                    - 192.168.1.31:8080
                    - 192.168.1.32:8080

            - job_name: "mysqld_exporter"
              static_configs:
                - targets:
                    - 192.168.1.40:9104

            - job_name: "haproxy_exporter"
              static_configs:
                - targets:
                    - 192.168.1.20:9101

            - job_name: "blackbox_http"
              metrics_path: /probe
              params:
                module:
                  - http_2xx
              static_configs:
                - targets:
                    - https://192.168.1.20
              relabel_configs:
                - source_labels:
                    - __address__
                  target_label: __param_target
                - source_labels:
                    - __param_target
                  target_label: instance
                - target_label: __address__
                  replacement: 127.0.0.1:9115

            - job_name: "blackbox_icmp"
              metrics_path: /probe
              params:
                module:
                  - icmp
              static_configs:
                - targets:
                    - 192.168.1.20
              relabel_configs:
                - source_labels:
                    - __address__
                  target_label: __param_target
                - source_labels:
                    - __param_target
                  target_label: instance
                - target_label: __address__
                  replacement: 127.0.0.1:9115


    - name: Create Prometheus systemd unit
      ansible.builtin.copy:
        dest: /etc/systemd/system/prometheus.service
        owner: root
        group: root
        mode: "0644"
        content: |
          [Unit]
          Description=Prometheus
          Wants=network-online.target
          After=network-online.target

          [Service]
          User={{ prometheus_user }}
          Group={{ prometheus_user }}
          Type=simple
          ExecStart=/usr/local/bin/prometheus \
            --config.file=/etc/prometheus/prometheus.yml \
            --storage.tsdb.path=/var/lib/prometheus \
            --web.console.templates=/etc/prometheus/consoles \
            --web.console.libraries=/etc/prometheus/console_libraries \
            --web.listen-address=0.0.0.0:9090

          Restart=always
          RestartSec=5

          [Install]
          WantedBy=multi-user.target

    - name: Add Grafana GPG key
      ansible.builtin.get_url:
        url: https://apt.grafana.com/gpg.key
        dest: /etc/apt/keyrings/grafana.key
        mode: "0644"

    - name: Add Grafana apt repository
      ansible.builtin.apt_repository:
        repo: "deb [signed-by=/etc/apt/keyrings/grafana.key] https://apt.grafana.com stable main"
        filename: grafana
        state: present
        update_cache: true

    - name: Install Grafana
      ansible.builtin.apt:
        name: grafana
        state: present

    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Enable and start Prometheus
      ansible.builtin.systemd:
        name: prometheus
        enabled: true
        state: restarted

    - name: Enable and start Grafana
      ansible.builtin.systemd:
        name: grafana-server
        enabled: true
        state: started

    - name: Check Prometheus health
      ansible.builtin.uri:
        url: http://127.0.0.1:9090/-/healthy
        method: GET
        status_code: 200

    - name: Check Grafana health
      ansible.builtin.uri:
        url: http://127.0.0.1:3000/api/health
        method: GET
        status_code: 200

    - name: Print access URLs
      ansible.builtin.debug:
        msg:
          - "Prometheus: http://192.168.1.40:9090"
          - "Grafana: http://192.168.1.40:3000"
          - "Grafana default login: admin / admin"
