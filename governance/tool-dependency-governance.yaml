tool_dependencies:

  metadata-parser:
    depends_on: []

  relationship-mapper:
    depends_on:
      - metadata-parser

  diagram-renderer:
    depends_on: []

  scenario-generator:
    depends_on:
      - metadata-parser
      - relationship-mapper
      - diagram-renderer

  taxonomy-validator:
    depends_on:
      - scenario-generator

  governance-checker:
    depends_on:
      - scenario-generator
      - taxonomy-validator

  topology-validator:
    depends_on:
      - relationship-mapper

  capability-validator:
    depends_on:
      - scenario-generator

  adjacency-validator:
    depends_on: []

  qualification-validator:
    depends_on: []

  complexity-validator:
    depends_on: []

  tool-boundary-validator:
    depends_on: []

  tool-dependency-validator:
    depends_on:
      - tool-boundary-validator

  scenario-governance-validator:
    depends_on:
      - capability-validator
      - adjacency-validator
      - qualification-validator
      - complexity-validator
      - tool-boundary-validator
      - tool-dependency-validator
