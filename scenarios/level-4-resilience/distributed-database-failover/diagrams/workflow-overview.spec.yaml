diagram:
  type: workflow-overview
  title: Distributed Database Failover - workflow-overview

  scenario: distributed-database-failover
  lifecycle: level-4-resilience
  layout: left-to-right

nodes:
  - id: application-service
    label: Application Service
    type: service
    group: service
  - id: database-primary
    label: Primary Database
    type: database
    group: data
  - id: database-replica
    label: Database Replica
    type: database
    group: data
  - id: database-telemetry
    label: Database Telemetry
    type: telemetry
    group: observability
  - id: analysis-engine
    label: Analysis Engine
    type: analysis
    group: analysis
  - id: resilience-coordinator
    label: Resilience Coordinator
    type: coordination
    group: resilience
edges:
  - from: application-service
    to: database-primary
    label: queries
  - from: database-primary
    to: database-replica
    label: replicates
  - from: database-primary
    to: database-telemetry
    label: emits metrics
  - from: database-telemetry
    to: analysis-engine
    label: correlates health
  - from: analysis-engine
    to: resilience-coordinator
    label: coordinates survivability
