[linux_observability_targets]
linux-node-01 ansible_host=192.168.8.129
linux-node-02 ansible_host=192.168.8.130

[linux_observability_targets:vars]
ansible_user=user1
ansible_python_interpreter=/usr/bin/python3
ansible_ssh_private_key_file=~/.ssh/snsd-hybridinfra/ansible.pem
ansible_ssh_common_args=-o StrictHostKeyChecking=no
