overview: |
  This scenario documents wan link monitoring within the network / wan operational domain. It focuses
  on WAN link, edge router, remote site, network path and demonstrates how infrastructure operations
  teams can use domain-specific telemetry, lifecycle workflow design, and evidence-backed validation
  to support detect and expose operational health signals before incident escalation.

objectives:
  - Define the scenario-specific network / wan signal represented by wan-link-monitoring.
  - Identify the affected network / wan components and dependencies.
  - Collect and interpret telemetry from WAN link, edge router, remote site, network path.
  - Use health status as an operational signal for detection or validation.
  - Use availability signal as an operational signal for detection or validation.
  - Use latency as an operational signal for detection or validation.
  - Document the lifecycle workflow from detection through validation.
  - Produce reviewer-readable evidence artifacts for portfolio assessment.

