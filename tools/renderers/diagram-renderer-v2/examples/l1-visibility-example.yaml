diagram:
  id: l1-visibility-example
  title: VPN Connectivity Monitoring
  lifecycle: level-1-visibility
  theme: dark
  layout_profile: visibility-layout

layout:
  direction: left-to-right
  workflow_lanes: false
  auto_grouping: true
  node_gap: 120
  section_gap: 200

sections:
  - id: source-systems
    label: Source Systems
    type: source

  - id: telemetry-pipeline
    label: Telemetry Pipeline
    type: telemetry

  - id: monitoring-layer
    label: Monitoring Layer
    type: monitoring

  - id: validation-output
    label: Validation Output
    type: validation

nodes:
  - id: branch-site
    label: Branch Site
    type: network
    section: source-systems
    group: connectivity
    criticality: medium

  - id: vpn-gateway
    label: VPN Gateway
    type: gateway
    section: source-systems
    group: connectivity
    criticality: high

  - id: telemetry-collector
    label: Telemetry Collector
    type: telemetry
    section: telemetry-pipeline
    group: observability

  - id: monitoring-dashboard
    label: Monitoring Dashboard
    type: dashboard
    section: monitoring-layer
    group: observability

  - id: validation-status
    label: Connectivity Validation
    type: validation
    section: validation-output
    group: validation
    status: validated

edges:
  - from: branch-site
    to: vpn-gateway
    type: telemetry-flow
    label: connectivity traffic

  - from: vpn-gateway
    to: telemetry-collector
    type: telemetry-flow
    label: exports metrics

  - from: telemetry-collector
    to: monitoring-dashboard
    type: monitoring
    label: monitoring visibility

  - from: monitoring-dashboard
    to: validation-status
    type: validation
    label: operational verification

dashboards:
  - id: operational-status
    title: Operational Status

    metrics:
      - VPN Status: Healthy
      - Tunnel Visibility: Normal
      - Telemetry Status: Active

annotations:
  - text: VPN tunnel visibility remains stable
    target: monitoring-dashboard
    annotation_type: operational

legends:
  node_types: true
  edge_types: true
  lifecycle_labels: true
  status_meanings: true
