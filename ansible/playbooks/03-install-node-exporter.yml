---
- name: Install Prometheus Node Exporter
  hosts: ubuntu_nodes
  become: true
  gather_facts: true

  vars:
    node_exporter_version: "1.8.2"
    node_exporter_arch: "linux-amd64"
    node_exporter_user: "node_exporter"

  tasks:
    - name: Create node_exporter system user
      ansible.builtin.user:
        name: "{{ node_exporter_user }}"
        shell: /usr/sbin/nologin
        system: true
        create_home: false

    - name: Download node_exporter archive
      ansible.builtin.get_url:
        url: "https://github.com/prometheus/node_exporter/releases/download/v{{ node_exporter_version }}/node_exporter-{{ node_exporter_version }}.{{ node_exporter_arch }}.tar.gz"
        dest: "/tmp/node_exporter-{{ node_exporter_version }}.{{ node_exporter_arch }}.tar.gz"
        mode: "0644"

    - name: Extract node_exporter archive
      ansible.builtin.unarchive:
        src: "/tmp/node_exporter-{{ node_exporter_version }}.{{ node_exporter_arch }}.tar.gz"
        dest: /tmp
        remote_src: true

    - name: Install node_exporter binary
      ansible.builtin.copy:
        src: "/tmp/node_exporter-{{ node_exporter_version }}.{{ node_exporter_arch }}/node_exporter"
        dest: /usr/local/bin/node_exporter
        owner: root
        group: root
        mode: "0755"
        remote_src: true

    - name: Create node_exporter systemd unit
      ansible.builtin.copy:
        dest: /etc/systemd/system/node_exporter.service
        owner: root
        group: root
        mode: "0644"
        content: |
          [Unit]
          Description=Prometheus Node Exporter
          Wants=network-online.target
          After=network-online.target

          [Service]
          User={{ node_exporter_user }}
          Group={{ node_exporter_user }}
          Type=simple
          ExecStart=/usr/local/bin/node_exporter \
            --web.listen-address=:9100

          Restart=always
          RestartSec=5

          [Install]
          WantedBy=multi-user.target

    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Enable and start node_exporter
      ansible.builtin.systemd:
        name: node_exporter
        enabled: true
        state: started

    - name: Check node_exporter service state
      ansible.builtin.command: systemctl is-active node_exporter
      register: node_exporter_state
      changed_when: false

    - name: Check node_exporter metrics endpoint locally
      ansible.builtin.uri:
        url: http://127.0.0.1:9100/metrics
        method: GET
        status_code: 200
        return_content: false

    - name: Print node_exporter state
      ansible.builtin.debug:
        msg:
          - "host={{ inventory_hostname }}"
          - "node_exporter={{ node_exporter_state.stdout }}"
          - "metrics=http://{{ ansible_host }}:9100/metrics"
