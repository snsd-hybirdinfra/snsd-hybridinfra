diagram:
  type: relationship-overview
  title: Service Mesh Traffic Restoration - relationship-overview

  scenario: service-mesh-traffic-restoration
  lifecycle: level-3-recovery
  layout: left-to-right

nodes:
  - id: client-traffic
    label: Client Traffic
    type: traffic
    group: service
  - id: load-balancer
    label: Load Balancer
    type: network
    group: connectivity
  - id: application-service
    label: Application Service
    type: service
    group: service
  - id: service-telemetry
    label: Service Telemetry
    type: telemetry
    group: observability
  - id: recovery-orchestrator
    label: Recovery Orchestrator
    type: automation
    group: recovery
edges:
  - from: client-traffic
    to: load-balancer
    label: routes through
  - from: load-balancer
    to: application-service
    label: distributes requests
  - from: application-service
    to: service-telemetry
    label: emits service signals
  - from: service-telemetry
    to: recovery-orchestrator
    label: triggers recovery workflow
