overview: |
  This scenario documents kubernetes cluster health monitoring within the kubernetes / cluster
  operational domain. It focuses on Kubernetes cluster, node, pod, control plane, service object and
  demonstrates how infrastructure operations teams can use domain-specific telemetry, lifecycle
  workflow design, and evidence-backed validation to support detect and expose operational health
  signals before incident escalation.

objectives:
  - Define the scenario-specific kubernetes / cluster signal represented by kubernetes-cluster-health-monitoring.
  - Identify the affected kubernetes / cluster components and dependencies.
  - Collect and interpret telemetry from Kubernetes cluster, node, pod, control plane, service object.
  - Use node readiness as an operational signal for detection or validation.
  - Use pod health as an operational signal for detection or validation.
  - Use API server availability as an operational signal for detection or validation.
  - Document the lifecycle workflow from detection through validation.
  - Produce reviewer-readable evidence artifacts for portfolio assessment.

