upstream failover_backends {
    server primary-backend:80 max_fails=1 fail_timeout=3s;
    server secondary-backend:80 backup;
}

server {
    listen 80;

    location / {
        proxy_pass http://failover_backends;
        proxy_connect_timeout 1s;
        proxy_read_timeout 2s;
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 2;
        add_header X-SNSD-Failover-Lab "09-resilience-failover-lab";
    }

    location /health {
        return 200 "failover-entrypoint-ok\n";
    }
}