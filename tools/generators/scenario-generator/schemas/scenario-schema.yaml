type: object

required:
  - scenario_name
  - lifecycle_level
  - category
  - severity
  - priority
  - environment
  - description

properties:

  scenario_id:
    type: string

  scenario_name:
    type: string

  scenario_title:
    type: string

  lifecycle_level:
    type: string

  operational_domain:
    type: string

  operational_pattern:
    type: string

  capability_tier:
    type: string

  category:
    type: string

  severity:
    type: string

  priority:
    type: string

  environment:
    type: string

  validation_scope:
    type: string

  telemetry_scope:
    type: string

  recovery_scope:
    type: string

  governance_scope:
    type: string

  description:
    type: string

  template_profile:
    type: string

  diagram_profile:
    type: string

  validation_profile:
    type: string

  maturity_profile:
    type: string

  relationships:

    type: object

    properties:

      previous_lifecycle_scenario:
        type: string

      next_lifecycle_scenario:
        type: string

      aggregation_sources:
        type: array

        items:
          type: string

      operational_rollups:
        type: array

        items:
          type: string

      convergence_parent:
        type: string

      convergence_children:
        type: array

        items:
          type: string

      resilience_reference:
        type: string

      continuity_reference:
        type: string

      related_capabilities:
        type: array

        items:
          type: string
