lifecycle_adjacency_rules:

  level-1-visibility:
    allowed_next:
      - level-2-correlation

  level-2-correlation:
    allowed_previous:
      - level-1-visibility
    allowed_next:
      - level-3-recovery

  level-3-recovery:
    allowed_previous:
      - level-2-correlation
    allowed_next:
      - level-4-resilience

  level-4-resilience:
    allowed_previous:
      - level-3-recovery
    allowed_next:
      - level-5-continuity

  level-5-continuity:
    allowed_previous:
      - level-4-resilience
